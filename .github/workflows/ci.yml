name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:

jobs:
  quality:
    name: Quality Gate (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (including dev tools)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"

      - name: Buildpython CI profile
        env:
          KEYRGB_HW_TESTS: "0"
        run: python -m buildpython --profile=ci

  test:
    name: Runtime Matrix (Py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Buildpython runtime validation steps
        env:
          KEYRGB_HW_TESTS: "0"
        run: |
          python -m buildpython --run-steps="Compile,Import Validation,Import Scan,Pip Check,Pytest,Coverage"
